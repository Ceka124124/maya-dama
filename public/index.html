<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>⚫🔴 DAMA ONLINE</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
:root {
  --bg: #0d0d1a;
  --surface: #13132a;
  --surface2: #1a1a35;
  --neon-gold: #ffcc00;
  --neon-cyan: #00d4ff;
  --neon-red: #ff4d6d;
  --neon-green: #00ff88;
  --text: #e8e8ff;
  --text-dim: #6666aa;
  --glow-gold: 0 0 10px #ffcc00, 0 0 30px #ffcc0066;
  --glow-cyan: 0 0 10px #00d4ff, 0 0 30px #00d4ff66;
  --glow-red: 0 0 10px #ff4d6d, 0 0 30px #ff4d6d66;
  --board-light: #2a1a4a;
  --board-dark: #0d0820;
}

*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Exo 2',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* ── STARS BG ── */
body::before{
  content:'';
  position:fixed;inset:0;
  background:
    radial-gradient(ellipse at 20% 20%,#1a0a3a 0%,transparent 50%),
    radial-gradient(ellipse at 80% 80%,#0a1a3a 0%,transparent 50%);
  pointer-events:none;z-index:0;
}

/* ── SCREENS ── */
.screen{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;z-index:10;transition:opacity .4s}
.screen.hidden{opacity:0;pointer-events:none}

/* ── LOBBY ── */
#lobbyScreen{
  flex-direction:column;gap:24px;
  background:radial-gradient(ellipse at center,#13132a 0%,#0d0d1a 100%);
}
.logo{
  font-family:'Orbitron',monospace;
  font-size:clamp(2rem,6vw,4rem);
  font-weight:900;
  text-align:center;
  background:linear-gradient(135deg,var(--neon-gold),var(--neon-cyan),var(--neon-red));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-shadow:none;
  filter:drop-shadow(0 0 20px #ffcc0099);
  animation:logoPulse 3s ease-in-out infinite;
}
@keyframes logoPulse{0%,100%{filter:drop-shadow(0 0 20px #ffcc0099)}50%{filter:drop-shadow(0 0 40px #00d4ff99)}}

.panel{
  background:var(--surface);
  border:1px solid #ffffff11;
  border-radius:16px;
  padding:28px;
  width:min(420px,90vw);
  box-shadow:0 8px 40px #00000088;
}
.panel h3{font-family:'Orbitron',monospace;font-size:1rem;color:var(--neon-cyan);margin-bottom:16px;letter-spacing:2px}

.input-row{display:flex;gap:10px;margin-bottom:12px}
input[type=text]{
  flex:1;background:#ffffff0a;border:1px solid #ffffff22;
  border-radius:8px;padding:10px 14px;color:var(--text);
  font-family:'Exo 2',sans-serif;font-size:.95rem;outline:none;
  transition:border-color .2s;
}
input[type=text]:focus{border-color:var(--neon-cyan)}

.btn{
  padding:10px 20px;border:none;border-radius:8px;
  font-family:'Orbitron',monospace;font-size:.8rem;letter-spacing:1px;
  cursor:pointer;transition:all .2s;position:relative;overflow:hidden;
}
.btn::after{content:'';position:absolute;inset:0;background:#fff1;opacity:0;transition:opacity .2s}
.btn:hover::after{opacity:1}
.btn-gold{background:var(--neon-gold);color:#1a1a00;box-shadow:var(--glow-gold)}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 4px 20px #ffcc0099}
.btn-cyan{background:var(--neon-cyan);color:#001a20;box-shadow:var(--glow-cyan)}
.btn-cyan:hover{transform:translateY(-2px)}
.btn-red{background:var(--neon-red);color:#fff;box-shadow:var(--glow-red)}
.btn-red:hover{transform:translateY(-2px)}
.btn-outline{background:transparent;border:1px solid var(--neon-gold);color:var(--neon-gold)}
.btn-outline:hover{background:#ffcc0011}
.btn-sm{padding:6px 12px;font-size:.7rem}
.btn-full{width:100%;margin-top:8px}

.avatar-picker{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.av-opt{
  width:48px;height:48px;border-radius:50%;font-size:1.5rem;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;border:2px solid transparent;background:#ffffff11;
  transition:all .2s;
}
.av-opt:hover,.av-opt.selected{border-color:var(--neon-gold);box-shadow:var(--glow-gold);transform:scale(1.1)}

.room-list{max-height:160px;overflow-y:auto;display:flex;flex-direction:column;gap:8px}
.room-item{
  display:flex;align-items:center;justify-content:space-between;
  background:#ffffff08;border-radius:8px;padding:10px 14px;
  border:1px solid #ffffff11;
}
.room-item span{font-size:.9rem;color:var(--text-dim)}

/* ── GAME LAYOUT ── */
#gameScreen{
  position:fixed;inset:0;display:flex;flex-direction:column;
  align-items:center;z-index:5;overflow:auto;
  padding:16px 8px;gap:12px;
}
#gameScreen.hidden{display:none}

.game-header{
  display:flex;width:min(700px,98vw);justify-content:space-between;align-items:center;
  gap:12px;
}

/* ── PLAYER CARDS ── */
.player-card{
  display:flex;align-items:center;gap:10px;
  background:var(--surface);border:1px solid #ffffff11;
  border-radius:12px;padding:10px 14px;flex:1;
  transition:border-color .3s,box-shadow .3s;position:relative;
}
.player-card.active-turn{
  border-color:var(--neon-gold);
  box-shadow:var(--glow-gold);
}
.player-card.active-turn.black-turn{
  border-color:var(--neon-cyan);
  box-shadow:var(--glow-cyan);
}
.avatar{
  width:44px;height:44px;border-radius:50%;font-size:1.4rem;
  display:flex;align-items:center;justify-content:center;
  background:#ffffff11;border:2px solid #ffffff22;
  position:relative;
}
.avatar.red-av{border-color:var(--neon-red)}
.avatar.black-av{border-color:var(--neon-cyan)}
.bot-badge{
  position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);
  background:var(--neon-gold);color:#000;font-size:.55rem;
  font-family:'Orbitron',monospace;letter-spacing:1px;
  padding:2px 5px;border-radius:4px;white-space:nowrap;
}
.player-info{flex:1;min-width:0}
.player-name{font-weight:600;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-color-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px}
.player-dots-red{background:var(--neon-red)}
.player-dots-black{background:var(--neon-cyan)}
.piece-count{font-size:.75rem;color:var(--text-dim);margin-top:2px}
.combo-badge{
  position:absolute;top:-8px;right:-8px;
  background:var(--neon-red);color:#fff;
  font-family:'Orbitron',monospace;font-size:.65rem;
  padding:2px 6px;border-radius:99px;
  animation:comboPop .3s ease;
}
@keyframes comboPop{0%{transform:scale(0)}100%{transform:scale(1)}}

.reaction-bubble{
  position:absolute;top:-40px;left:50%;transform:translateX(-50%);
  font-size:1.5rem;background:var(--surface2);border:1px solid #fff2;
  border-radius:99px;padding:4px 10px;white-space:nowrap;
  animation:bubbleUp .3s ease,bubbleFade 0s 1.8s forwards;
  pointer-events:none;z-index:20;
}
@keyframes bubbleUp{from{transform:translateX(-50%) translateY(10px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
@keyframes bubbleFade{to{opacity:0}}

/* ── BOARD ── */
.board-wrapper{
  position:relative;
  box-shadow:0 0 60px #00d4ff22,0 0 120px #ff4d6d11;
}
#board{
  display:grid;grid-template-columns:repeat(8,1fr);
  width:min(480px,95vw);height:min(480px,95vw);
  border:2px solid var(--neon-cyan);border-radius:4px;
  overflow:hidden;
}
.cell{
  position:relative;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:background .15s;
}
.cell.light{background:var(--board-light)}
.cell.dark{background:var(--board-dark)}
.cell.highlight-move{background:#00ff8833 !important}
.cell.highlight-capture{background:#ff4d6d44 !important}
.cell.last-from{background:#ffcc0022 !important}
.cell.last-to{background:#ffcc0033 !important}

.cell:hover{filter:brightness(1.15)}

/* dot indicator */
.cell.highlight-move::after{
  content:'';position:absolute;
  width:35%;height:35%;border-radius:50%;
  background:#00ff88;opacity:.8;
  box-shadow:0 0 8px #00ff88;
  animation:dotPulse 1s ease-in-out infinite;
}
.cell.highlight-capture::after{
  content:'';position:absolute;
  width:55%;height:55%;border-radius:50%;
  border:2px solid var(--neon-red);opacity:.9;
  box-shadow:0 0 12px var(--neon-red);
  animation:dotPulse 1s ease-in-out infinite;
}
@keyframes dotPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}

/* ── PIECES ── */
.piece{
  width:76%;height:76%;border-radius:50%;
  position:absolute;cursor:pointer;
  transition:transform .15s,box-shadow .15s,top .25s ease,left .25s ease;
  display:flex;align-items:center;justify-content:center;
  user-select:none;
}
.piece-red{
  background:radial-gradient(circle at 35% 35%,#ff8099,#ff4d6d,#cc0033);
  border:2px solid #ff8099;
  box-shadow:0 2px 8px #ff4d6d88,inset 0 1px 2px #fff4;
}
.piece-black{
  background:radial-gradient(circle at 35% 35%,#4466aa,#00d4ff22,#001a40);
  border:2px solid #00d4ff;
  box-shadow:0 2px 8px #00d4ff66,inset 0 1px 2px #fff2;
}
.piece.selected{
  transform:scale(1.18) translateY(-4px);
  box-shadow:0 8px 24px #ffcc0088 !important;
  border-color:var(--neon-gold) !important;
}
.piece:hover:not(.selected){transform:scale(1.08)}
.king-crown{font-size:.9em;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none}

/* ── BOT THINKING ── */
.bot-thinking{
  position:absolute;top:-40px;left:50%;transform:translateX(-50%);
  background:var(--surface2);border:1px solid var(--neon-gold);
  border-radius:99px;padding:4px 14px;font-size:.75rem;
  font-family:'Orbitron',monospace;color:var(--neon-gold);
  white-space:nowrap;display:none;
}
.bot-thinking.show{display:block;animation:float 1.5s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-4px)}}
.dot-loader{display:inline-flex;gap:3px;margin-left:4px}
.dot-loader span{width:4px;height:4px;border-radius:50%;background:var(--neon-gold);animation:dotBounce 1.2s infinite}
.dot-loader span:nth-child(2){animation-delay:.2s}
.dot-loader span:nth-child(3){animation-delay:.4s}
@keyframes dotBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

/* ── BOTTOM SECTION ── */
.bottom-section{
  display:flex;width:min(700px,98vw);gap:12px;flex-wrap:wrap;
}

/* ── CHAT ── */
.chat-panel{
  flex:1;min-width:220px;background:var(--surface);
  border:1px solid #ffffff11;border-radius:12px;padding:14px;
  display:flex;flex-direction:column;gap:8px;
  max-height:200px;
}
.chat-title{font-family:'Orbitron',monospace;font-size:.75rem;color:var(--neon-cyan);letter-spacing:2px}
.chat-messages{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:4px;min-height:80px}
.chat-msg{font-size:.8rem;line-height:1.4}
.chat-msg .msg-name{font-weight:700}
.chat-msg.red-msg .msg-name{color:var(--neon-red)}
.chat-msg.black-msg .msg-name{color:var(--neon-cyan)}
.chat-input-row{display:flex;gap:6px}
.chat-input-row input{flex:1;background:#ffffff0a;border:1px solid #ffffff22;border-radius:6px;padding:6px 10px;color:var(--text);font-size:.8rem;outline:none}
.chat-input-row input:focus{border-color:var(--neon-cyan)}

/* ── SIDE PANEL ── */
.side-panel{display:flex;flex-direction:column;gap:8px;min-width:160px}

.reaction-bar{
  background:var(--surface);border:1px solid #ffffff11;
  border-radius:12px;padding:10px;
  display:flex;gap:6px;flex-wrap:wrap;justify-content:center;
}
.reaction-btn{
  font-size:1.3rem;cursor:pointer;padding:4px;border-radius:8px;
  transition:transform .15s,background .15s;
  border:none;background:transparent;
}
.reaction-btn:hover{transform:scale(1.3);background:#ffffff11}

.fun-panel{
  background:var(--surface);border:1px solid #ffffff11;
  border-radius:12px;padding:10px;
  display:flex;flex-direction:column;gap:6px;
}
.fun-panel span{font-family:'Orbitron',monospace;font-size:.65rem;color:var(--text-dim);letter-spacing:1px}
.fun-row{display:flex;gap:6px;flex-wrap:wrap}

/* ── MUSIC TOGGLE ── */
.music-btn{
  position:fixed;top:12px;right:12px;z-index:100;
  background:var(--surface);border:1px solid #ffffff22;
  border-radius:99px;padding:8px 14px;cursor:pointer;
  font-size:.85rem;transition:all .2s;
}
.music-btn:hover{background:var(--surface2);border-color:var(--neon-gold)}

/* ── WIN SCREEN ── */
#winScreen{
  position:fixed;inset:0;background:#0009;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:20px;z-index:200;
  opacity:0;transition:opacity .5s;pointer-events:none;
}
#winScreen.show{opacity:1;pointer-events:all}
.win-box{
  background:var(--surface);border:2px solid var(--neon-gold);
  border-radius:20px;padding:40px;text-align:center;
  box-shadow:var(--glow-gold);
  animation:winPop .5s cubic-bezier(.175,.885,.32,1.275);
}
@keyframes winPop{from{transform:scale(.5)}to{transform:scale(1)}}
.win-emoji{font-size:4rem;animation:spin 2s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.win-title{font-family:'Orbitron',monospace;font-size:2rem;color:var(--neon-gold);margin:.5rem 0}
.win-sub{color:var(--text-dim);font-size:.9rem}

/* ── CONFETTI ── */
.confetti-piece{
  position:fixed;width:10px;height:10px;
  border-radius:2px;
  animation:confettiFall linear forwards;
  pointer-events:none;z-index:300;
}
@keyframes confettiFall{
  0%{transform:translateY(-20px) rotate(0deg);opacity:1}
  100%{transform:translateY(100vh) rotate(720deg);opacity:0}
}

/* ── STATUS BAR ── */
.status-bar{
  font-family:'Orbitron',monospace;font-size:.75rem;
  letter-spacing:2px;color:var(--text-dim);text-align:center;
}
#turnIndicator{
  font-family:'Orbitron',monospace;font-size:.8rem;
  padding:6px 20px;border-radius:99px;
  background:var(--surface);border:1px solid;
  text-align:center;white-space:nowrap;
}
#turnIndicator.red{border-color:var(--neon-red);color:var(--neon-red);box-shadow:var(--glow-red)}
#turnIndicator.black{border-color:var(--neon-cyan);color:var(--neon-cyan);box-shadow:var(--glow-cyan)}

/* ── COMBO ANIM ── */
.combo-anim{
  position:fixed;top:30%;left:50%;transform:translateX(-50%);
  font-family:'Orbitron',monospace;font-size:3rem;font-weight:900;
  color:var(--neon-gold);text-shadow:var(--glow-gold);
  pointer-events:none;z-index:150;
  animation:comboSlide .6s cubic-bezier(.175,.885,.32,1.275) forwards,
            comboFade 0s .9s forwards;
}
@keyframes comboSlide{from{transform:translateX(-50%) scale(.3)}to{transform:translateX(-50%) scale(1)}}
@keyframes comboFade{to{opacity:0}}

/* ── COIN ANIM ── */
.coin-anim{
  position:fixed;bottom:30%;left:50%;transform:translateX(-50%);
  font-family:'Orbitron',monospace;font-size:1.5rem;
  color:var(--neon-gold);text-shadow:var(--glow-gold);
  pointer-events:none;z-index:150;
  animation:coinUp 1.5s ease forwards;
}
@keyframes coinUp{
  0%{transform:translateX(-50%) translateY(0);opacity:1}
  100%{transform:translateX(-50%) translateY(-60px);opacity:0}
}

/* ── SCROLLBARS ── */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:#ffffff08}
::-webkit-scrollbar-thumb{background:var(--neon-cyan);border-radius:99px}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);
  background:var(--surface2);border:1px solid var(--neon-cyan);
  border-radius:99px;padding:8px 20px;font-size:.85rem;
  color:var(--neon-cyan);transition:transform .3s;z-index:500;
  white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0)}

/* ── DAILY QUESTS ── */
.quests-panel{
  background:var(--surface);border:1px solid #ffffff11;
  border-radius:12px;padding:12px;flex:1;min-width:180px;
}
.quests-panel h4{font-family:'Orbitron',monospace;font-size:.7rem;color:var(--neon-gold);letter-spacing:2px;margin-bottom:8px}
.quest-item{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.quest-icon{font-size:1rem}
.quest-text{font-size:.75rem;color:var(--text-dim);flex:1}
.quest-bar{height:4px;background:#ffffff11;border-radius:99px;width:60px}
.quest-fill{height:100%;background:var(--neon-gold);border-radius:99px;transition:width .5s}
.quest-reward{font-size:.7rem;color:var(--neon-gold)}

/* mobile */
@media(max-width:600px){
  .bottom-section{flex-direction:column}
  .side-panel{flex-direction:row;flex-wrap:wrap}
}
</style>
</head>
<body>

<!-- ── MUSIC BTN ── -->
<button class="music-btn" onclick="toggleMusic()" id="musicBtn">🎵 ON</button>

<!-- ════════════════ LOBBY ════════════════ -->
<div id="lobbyScreen" class="screen">
  <div class="logo">⚫🔴 DAMA ONLINE</div>
  <p style="color:var(--text-dim);font-size:.85rem;letter-spacing:2px;text-align:center;margin-top:-16px">TÜRK DAMASI • MULTİPLAYER</p>

  <div class="panel">
    <h3>👤 PROFİL</h3>
    <div class="avatar-picker" id="avatarPicker">
      <div class="av-opt selected" data-av="🦊" onclick="selectAvatar(this)">🦊</div>
      <div class="av-opt" data-av="🐺" onclick="selectAvatar(this)">🐺</div>
      <div class="av-opt" data-av="🐉" onclick="selectAvatar(this)">🐉</div>
      <div class="av-opt" data-av="🦁" onclick="selectAvatar(this)">🦁</div>
      <div class="av-opt" data-av="🐸" onclick="selectAvatar(this)">🐸</div>
      <div class="av-opt" data-av="🤖" onclick="selectAvatar(this)">🤖</div>
      <div class="av-opt" data-av="👾" onclick="selectAvatar(this)">👾</div>
      <div class="av-opt" data-av="💀" onclick="selectAvatar(this)">💀</div>
    </div>
    <div class="input-row">
      <input type="text" id="nameInput" placeholder="Kullanıcı adı..." maxlength="16" value="Oyuncu">
    </div>
    <button class="btn btn-gold btn-full" onclick="createRoom()">🚀 ODA OLUŞTUR</button>
    <button class="btn btn-outline btn-full" style="margin-top:6px" onclick="enableBotSolo()">🤖 BOTA KARŞI OYNA</button>
  </div>

  <div class="panel">
    <h3>🔍 ODA BUL</h3>
    <div class="input-row">
      <input type="text" id="joinCode" placeholder="Oda kodu..." maxlength="6" style="text-transform:uppercase">
      <button class="btn btn-cyan btn-sm" onclick="joinByCode()">GİR</button>
    </div>
    <div class="room-list" id="roomList"></div>
    <button class="btn btn-outline btn-sm btn-full" style="margin-top:8px" onclick="refreshRooms()">🔄 Yenile</button>
  </div>
</div>

<!-- ════════════════ GAME ════════════════ -->
<div id="gameScreen" class="screen hidden">

  <!-- Header -->
  <div class="game-header">
    <div class="player-card" id="cardRed">
      <div class="avatar red-av" id="avRed">🦊</div>
      <div class="player-info">
        <div class="player-name"><span class="player-color-dot player-dots-red"></span><span id="nameRed">Red</span></div>
        <div class="piece-count">🔴 <span id="countRed">12</span> taş</div>
      </div>
    </div>

    <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
      <div id="turnIndicator" class="red">🔴 SEN</div>
      <div id="waitMsg" class="status-bar">Bekleniyor...</div>
      <div class="bot-thinking" id="botThinking">
        Düşünüyor<div class="dot-loader"><span></span><span></span><span></span></div>
      </div>
    </div>

    <div class="player-card" id="cardBlack">
      <div class="player-info" style="text-align:right">
        <div class="player-name"><span id="nameBlack">Black</span> <span class="player-color-dot player-dots-black"></span></div>
        <div class="piece-count"><span id="countBlack">12</span> taş 🔵</div>
      </div>
      <div class="avatar black-av" id="avBlack">❓</div>
    </div>
  </div>

  <!-- Board -->
  <div class="board-wrapper">
    <div id="board"></div>
  </div>

  <!-- Bottom -->
  <div class="bottom-section">

    <!-- Chat -->
    <div class="chat-panel">
      <div class="chat-title">💬 CHAT</div>
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-row">
        <input type="text" id="chatInput" placeholder="Mesaj..." maxlength="80" onkeydown="if(event.key==='Enter')sendChat()">
        <button class="btn btn-cyan btn-sm" onclick="sendChat()">↵</button>
      </div>
    </div>

    <!-- Side -->
    <div class="side-panel">
      <!-- Reactions -->
      <div class="reaction-bar">
        <button class="reaction-btn" onclick="sendReaction('🔥')">🔥</button>
        <button class="reaction-btn" onclick="sendReaction('😂')">😂</button>
        <button class="reaction-btn" onclick="sendReaction('😱')">😱</button>
        <button class="reaction-btn" onclick="sendReaction('👏')">👏</button>
        <button class="reaction-btn" onclick="sendReaction('😎')">😎</button>
      </div>

      <!-- Fun buttons -->
      <div class="fun-panel">
        <span>🎲 EĞLENCE</span>
        <div class="fun-row">
          <button class="btn btn-outline btn-sm" onclick="funAction('dance')">💃 Dans Et</button>
          <button class="btn btn-outline btn-sm" onclick="funAction('dice')">🎲 Zar</button>
          <button class="btn btn-outline btn-sm" onclick="funAction('emoji')">😜 Emoji</button>
        </div>
      </div>

      <!-- Quests -->
      <div class="quests-panel">
        <h4>🎯 GÖREVLER</h4>
        <div class="quest-item">
          <span class="quest-icon">⚔️</span>
          <span class="quest-text">3 Taş Vur</span>
          <div class="quest-bar"><div class="quest-fill" id="qFill1" style="width:0%"></div></div>
          <span class="quest-reward">+20⭐</span>
        </div>
        <div class="quest-item">
          <span class="quest-icon">👑</span>
          <span class="quest-text">Damka Yap</span>
          <div class="quest-bar"><div class="quest-fill" id="qFill2" style="width:0%"></div></div>
          <span class="quest-reward">+30⭐</span>
        </div>
        <div class="quest-item">
          <span class="quest-icon">🏆</span>
          <span class="quest-text">Kazan</span>
          <div class="quest-bar"><div class="quest-fill" id="qFill3" style="width:0%"></div></div>
          <span class="quest-reward">+50⭐</span>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- ── WIN SCREEN ── -->
<div id="winScreen">
  <div class="win-box">
    <div class="win-emoji" id="winEmoji">🏆</div>
    <div class="win-title" id="winTitle">KAZANDIN!</div>
    <div class="win-sub" id="winSub">+10 coin kazandın</div>
    <div style="display:flex;gap:12px;margin-top:20px;justify-content:center">
      <button class="btn btn-gold" onclick="playAgain()">🔁 Tekrar</button>
      <button class="btn btn-outline" onclick="goLobby()">🏠 Lobi</button>
    </div>
  </div>
</div>

<!-- ── TOAST ── -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════
// AUDIO ENGINE
// ═══════════════════════════════════════════════════
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
let musicEnabled = true;
let bgGain;

function getAudioCtx(){
  if(!audioCtx) audioCtx = new AudioCtx();
  return audioCtx;
}

function playTone(freq, type='sine', dur=0.1, vol=0.3, delay=0){
  try{
    const ctx = getAudioCtx();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, ctx.currentTime+delay);
    gain.gain.setValueAtTime(vol, ctx.currentTime+delay);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+delay+dur);
    osc.start(ctx.currentTime+delay);
    osc.stop(ctx.currentTime+delay+dur+0.05);
  }catch(e){}
}

function sfxMove(){
  playTone(440,'sine',0.08,0.2);
  playTone(550,'sine',0.06,0.15,0.05);
}
function sfxCapture(){
  playTone(200,'sawtooth',0.12,0.4);
  playTone(150,'square',0.08,0.3,0.1);
}
function sfxKing(){
  [523,659,784].forEach((f,i)=>playTone(f,'sine',0.15,0.3,i*0.08));
}
function sfxWin(){
  [523,659,784,1047].forEach((f,i)=>playTone(f,'sine',0.2,0.4,i*0.1));
}
function sfxIllegal(){
  playTone(100,'square',0.1,0.3);
}
function sfxChat(){
  playTone(880,'sine',0.06,0.15);
}
function sfxReaction(){
  playTone(660,'sine',0.08,0.2);
  playTone(880,'sine',0.06,0.15,0.06);
}
function sfxSelect(){
  playTone(600,'sine',0.05,0.15);
}

function startBgMusic(){
  if(!musicEnabled) return;
  try{
    const ctx = getAudioCtx();
    bgGain = ctx.createGain();
    bgGain.gain.value = 0.06;
    bgGain.connect(ctx.destination);

    const notes = [130,146,164,174,195,220,246,261];
    let i=0;
    function playNote(){
      if(!musicEnabled || !bgGain) return;
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.connect(g); g.connect(bgGain);
      osc.type='triangle';
      const n = notes[i%notes.length] * (Math.random()>0.7?2:1);
      osc.frequency.value = n;
      g.gain.setValueAtTime(0.3, ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.6);
      osc.start(ctx.currentTime);
      osc.stop(ctx.currentTime+0.6);
      i++;
      setTimeout(playNote, 400+Math.random()*400);
    }
    playNote();
  }catch(e){}
}

function toggleMusic(){
  musicEnabled = !musicEnabled;
  document.getElementById('musicBtn').textContent = musicEnabled ? '🎵 ON' : '🎵 OFF';
  if(musicEnabled) startBgMusic();
  else if(bgGain){ try{bgGain.disconnect()}catch(e){} bgGain=null; }
}

// ═══════════════════════════════════════════════════
// SOCKET
// ═══════════════════════════════════════════════════
const socket = io();
let myColor = null;
let myRoomId = null;
let boardState = null;
let selectedCell = null;
let currentTurn = null;
let botMode = false;
let botColor = null;
let quests = {captures:0, kings:0, wins:0};
let coins = 0;

// Profile
let selectedAvatar = '🦊';
function selectAvatar(el){
  document.querySelectorAll('.av-opt').forEach(e=>e.classList.remove('selected'));
  el.classList.add('selected');
  selectedAvatar = el.dataset.av;
}

// ── LOBBY EVENTS ──
socket.on('roomCreated', ({roomId, color})=>{
  myRoomId = roomId;
  myColor = color;
  showToast(`Oda kodu: ${roomId} — Arkadaşını bekle ya da Bot başlat!`);
});

socket.on('roomList', (rooms)=>{
  const list = document.getElementById('roomList');
  list.innerHTML = '';
  if(rooms.length === 0){
    list.innerHTML = '<div style="color:var(--text-dim);font-size:.8rem;text-align:center;padding:10px">Açık oda yok</div>';
    return;
  }
  rooms.forEach(r=>{
    const div = document.createElement('div');
    div.className='room-item';
    div.innerHTML=`<span><b>${r.host}</b> • ${r.id}</span><span>${r.players}/2</span>
      <button class="btn btn-cyan btn-sm" onclick="joinRoom('${r.id}')">Katıl</button>`;
    list.appendChild(div);
  });
});

socket.on('gameStart', (data)=>{
  boardState = data.board;
  currentTurn = data.turn;
  myColor = myColor || data.colors[socket.id];
  botMode = data.botMode || false;
  botColor = data.botColor || null;

  document.getElementById('nameRed').textContent = data.names.red;
  document.getElementById('nameBlack').textContent = data.names.black;
  document.getElementById('avRed').textContent = data.avatars?.red || '🦊';
  document.getElementById('avBlack').textContent = data.avatars?.black || '❓';

  if(botMode && myColor !== null){
    const botAv = document.getElementById(botColor==='red'?'avRed':'avBlack');
    // Add BOT badge
    const badge = document.createElement('div');
    badge.className='bot-badge';badge.textContent='BOT';
    botAv.appendChild(badge);
  }

  showGameScreen();
  renderBoard();
  updateTurnUI();
  startBgMusic();
  document.getElementById('waitMsg').textContent = '';
});

socket.on('boardUpdate', (data)=>{
  boardState = data.board;
  currentTurn = data.turn;
  selectedCell = null;
  clearHighlights();
  renderBoard();
  updateTurnUI();

  if(data.lastMove?.captures?.length > 0){
    sfxCapture();
    quests.captures += data.lastMove.captures.length;
    updateQuestUI();
    if(data.combo && data.combo[myColor] >= 2){
      showComboAnim(data.combo[myColor]);
    }
  } else {
    sfxMove();
  }

  // Check for new king
  if(data.lastMove){
    const [tr,tc] = data.lastMove.to;
    if(boardState[tr][tc]===2||boardState[tr][tc]===4){
      sfxKing();
      quests.kings = Math.max(quests.kings,1);
      updateQuestUI();
    }
  }

  if(data.botMove){
    document.getElementById('botThinking').classList.remove('show');
  }

  updatePieceCount();
  highlightLastMove(data.lastMove);
});

socket.on('legalMoves', (moves)=>{
  clearHighlights();
  moves.forEach(m=>{
    const cell = getCellEl(m.to[0], m.to[1]);
    if(cell){
      if(m.captures.length > 0) cell.classList.add('highlight-capture');
      else cell.classList.add('highlight-move');
    }
  });
});

socket.on('illegalMove', ()=>{ sfxIllegal(); showToast('Geçersiz hamle!'); });

socket.on('chatMessage', (msg)=>{
  appendChat(msg);
  sfxChat();
});

socket.on('reaction', ({color, emoji})=>{
  showReactionBubble(color, emoji);
  sfxReaction();
});

socket.on('funAction', ({color, action})=>{
  handleFunAction(color, action);
});

socket.on('gameEnd', (data)=>{
  selectedCell = null;
  boardState = data.board;
  renderBoard();
  const isWin = data.winner === myColor;
  setTimeout(()=>{
    if(isWin){
      sfxWin();
      coins += 10;
      quests.wins = 1;
      updateQuestUI();
      showWin(true, data.reason);
    } else {
      showWin(false, data.reason);
    }
  }, 300);
});

socket.on('error', (msg)=>showToast('⚠️ '+msg));

// ─── CREATE / JOIN ───
function createRoom(){
  const name = document.getElementById('nameInput').value.trim() || 'Oyuncu';
  socket.emit('createRoom', {name, avatar: selectedAvatar});
}

function joinByCode(){
  const code = document.getElementById('joinCode').value.trim().toUpperCase();
  if(!code) return;
  joinRoom(code);
}

function joinRoom(roomId){
  const name = document.getElementById('nameInput').value.trim() || 'Oyuncu';
  myRoomId = roomId;
  socket.emit('joinRoom', {roomId, name, avatar: selectedAvatar});
}

function enableBotSolo(){
  const name = document.getElementById('nameInput').value.trim() || 'Oyuncu';
  socket.emit('createRoom', {name, avatar: selectedAvatar});
  setTimeout(()=>{
    socket.emit('enableBot');
  }, 200);
}

function refreshRooms(){ socket.emit('getRooms'); }
socket.emit('getRooms');

// ─── BOARD RENDER ───
function renderBoard(){
  const board = document.getElementById('board');
  board.innerHTML = '';
  if(!boardState) return;

  for(let r=0;r<8;r++){
    for(let c=0;c<8;c++){
      const cell = document.createElement('div');
      cell.className = 'cell ' + ((r+c)%2===0?'light':'dark');
      cell.dataset.r=r; cell.dataset.c=c;
      cell.onclick = ()=>onCellClick(r,c);

      const piece = boardState[r][c];
      if(piece){
        const div = document.createElement('div');
        div.className = 'piece ' + (piece===1||piece===2?'piece-red':'piece-black');
        div.dataset.r=r; div.dataset.c=c;
        if(piece===2||piece===4){
          div.innerHTML='<span class="king-crown">👑</span>';
        }
        if(selectedCell && selectedCell[0]===r && selectedCell[1]===c){
          div.classList.add('selected');
        }
        cell.appendChild(div);
      }
      board.appendChild(cell);
    }
  }
  updatePieceCount();
}

function getCellEl(r,c){
  return document.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
}

function clearHighlights(){
  document.querySelectorAll('.cell').forEach(el=>{
    el.classList.remove('highlight-move','highlight-capture','last-from','last-to');
  });
}

function highlightLastMove(move){
  if(!move) return;
  const f=getCellEl(move.from[0],move.from[1]);
  const t=getCellEl(move.to[0],move.to[1]);
  if(f) f.classList.add('last-from');
  if(t) t.classList.add('last-to');
}

function onCellClick(r,c){
  if(!boardState || currentTurn !== myColor) return;

  const piece = boardState[r][c];
  const isMyPiece = (myColor==='red' && (piece===1||piece===2)) ||
                    (myColor==='black' && (piece===3||piece===4));

  if(isMyPiece){
    selectedCell = [r,c];
    renderBoard();
    sfxSelect();
    socket.emit('getLegalMoves', {row:r, col:c});
    return;
  }

  if(selectedCell){
    // Try to move
    socket.emit('playerMove', {from: selectedCell, to:[r,c]});
    selectedCell = null;
    clearHighlights();
  }
}

function updateTurnUI(){
  const ind = document.getElementById('turnIndicator');
  const isMyTurn = currentTurn === myColor;

  if(currentTurn==='red'){
    ind.className='red';
    ind.textContent = isMyTurn ? '🔴 SENİN SIRAN' : '🔴 Kırmızı oynuyor';
  } else {
    ind.className='black';
    ind.textContent = isMyTurn ? '🔵 SENİN SIRAN' : '🔵 Mavi oynuyor';
  }

  // Bot thinking indicator
  if(botMode && currentTurn===botColor){
    document.getElementById('botThinking').classList.add('show');
  }

  // Highlight active card
  document.getElementById('cardRed').classList.toggle('active-turn', currentTurn==='red');
  document.getElementById('cardBlack').classList.toggle('active-turn', currentTurn==='black');
  document.getElementById('cardBlack').classList.toggle('black-turn', currentTurn==='black');
}

function updatePieceCount(){
  if(!boardState) return;
  let red=0,black=0;
  for(let r=0;r<8;r++) for(let c=0;c<8;c++){
    if(boardState[r][c]===1||boardState[r][c]===2) red++;
    if(boardState[r][c]===3||boardState[r][c]===4) black++;
  }
  document.getElementById('countRed').textContent=red;
  document.getElementById('countBlack').textContent=black;
}

// ─── CHAT ───
function sendChat(){
  const input = document.getElementById('chatInput');
  const text = input.value.trim();
  if(!text) return;
  socket.emit('chatMessage', {text});
  input.value='';
}

function appendChat(msg){
  const box = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = `chat-msg ${msg.color}-msg`;
  div.innerHTML = `<span class="msg-name">${escapeHtml(msg.name)}</span>: ${escapeHtml(msg.text)}`;
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

// ─── REACTIONS ───
function sendReaction(emoji){
  socket.emit('reaction', {emoji});
}

function showReactionBubble(color, emoji){
  const avId = color==='red'?'avRed':'avBlack';
  const av = document.getElementById(avId);
  const old = av.querySelector('.reaction-bubble');
  if(old) old.remove();
  const bubble = document.createElement('div');
  bubble.className='reaction-bubble';
  bubble.textContent = emoji;
  av.style.position='relative';
  av.appendChild(bubble);
  setTimeout(()=>bubble.remove(), 2200);
}

// ─── FUN ───
function funAction(action){
  socket.emit('funAction', {action});
}

const danceEmojis = ['💃','🕺','🎊','🥳'];
const funEmojis = ['🤪','😜','🤩','🎯','🔥','⚡','💥','🌟'];

function handleFunAction(color, action){
  const card = document.getElementById(color==='red'?'cardRed':'cardBlack');
  let emoji = '';
  if(action==='dance') emoji = danceEmojis[Math.floor(Math.random()*danceEmojis.length)];
  else if(action==='dice') emoji = '🎲 ' + (Math.floor(Math.random()*6)+1);
  else if(action==='emoji') emoji = funEmojis[Math.floor(Math.random()*funEmojis.length)];

  // Bounce animation on card
  card.style.animation='none';
  card.offsetHeight;
  card.style.animation='comboPop .3s ease';
  showToast(`${emoji}`);
}

// ─── QUESTS ───
function updateQuestUI(){
  // Quest 1: 3 captures
  const q1 = Math.min(quests.captures/3, 1);
  document.getElementById('qFill1').style.width=(q1*100)+'%';
  // Quest 2: king
  const q2 = Math.min(quests.kings, 1);
  document.getElementById('qFill2').style.width=(q2*100)+'%';
  // Quest 3: win
  const q3 = Math.min(quests.wins, 1);
  document.getElementById('qFill3').style.width=(q3*100)+'%';
}

// ─── COMBO ───
function showComboAnim(count){
  const div = document.createElement('div');
  div.className='combo-anim';
  div.textContent=`COMBO x${count}`;
  document.body.appendChild(div);
  setTimeout(()=>div.remove(), 1000);
}

// ─── WIN SCREEN ───
function showWin(isWin, reason){
  const ws = document.getElementById('winScreen');
  document.getElementById('winEmoji').textContent = isWin?'🏆':'💀';
  document.getElementById('winTitle').textContent = isWin?'KAZANDIN! 🎉':(reason==='disconnect'?'Rakip Ayrıldı':'KAYBETTİN');
  document.getElementById('winSub').textContent = isWin ? `+10 🪙 coin kazandın! Toplam: ${coins} 🪙` : 'Bir dahaki sefere! 💪';
  ws.classList.add('show');
  if(isWin) spawnConfetti();
}

function playAgain(){
  document.getElementById('winScreen').classList.remove('show');
  quests={captures:0,kings:0,wins:0};
  updateQuestUI();
  selectedCell=null;
  // Re-create room or bot
  if(botMode){
    socket.emit('createRoom', {name: document.getElementById('nameRed').textContent, avatar: selectedAvatar});
    setTimeout(()=>socket.emit('enableBot'), 200);
  } else {
    goLobby();
  }
}

function goLobby(){
  document.getElementById('winScreen').classList.remove('show');
  document.getElementById('gameScreen').classList.add('hidden');
  document.getElementById('lobbyScreen').classList.remove('hidden');
  myColor=null; myRoomId=null; boardState=null; botMode=false;
  socket.emit('getRooms');
}

// ─── CONFETTI ───
function spawnConfetti(){
  const colors=['#ffcc00','#00d4ff','#ff4d6d','#00ff88','#ff88cc'];
  for(let i=0;i<80;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.left=Math.random()*100+'vw';
    el.style.background=colors[Math.floor(Math.random()*colors.length)];
    el.style.animationDuration=(2+Math.random()*3)+'s';
    el.style.animationDelay=Math.random()*1+'s';
    el.style.transform=`rotate(${Math.random()*360}deg)`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(), 5000);
  }
}

// ─── TOAST ───
function showToast(msg, dur=2500){
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}

// ─── SCREENS ───
function showGameScreen(){
  document.getElementById('lobbyScreen').classList.add('hidden');
  document.getElementById('gameScreen').classList.remove('hidden');
}

// ─── UTIL ───
function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
</script>
</body>
</html>
